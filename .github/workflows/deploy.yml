name: Build and Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: mathpath-tutor
  ECS_SERVICE: mathpath-tutor-service
  ECS_CLUSTER: mathpath-cluster
  CONTAINER_NAME: mathpath-tutor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check AWS deploy configuration
        id: aws-deploy
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### AWS deploy skipped"
              echo ""
              echo "The app build passed, but AWS_ROLE_ARN is not configured for this repository."
              echo "Add AWS_ROLE_ARN to repository secrets to enable the ECR/ECS deployment path."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          {
            echo "### AWS deploy enabled"
            echo ""
            echo "AWS_ROLE_ARN is configured; continuing with ECR/ECS deployment."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials
        if: steps.aws-deploy.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.aws-deploy.outputs.enabled == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        if: steps.aws-deploy.outputs.enabled == 'true'
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        if: steps.aws-deploy.outputs.enabled == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: aws/task-definition.json
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment summary
        if: steps.aws-deploy.outputs.enabled == 'true'
        run: |
          {
            echo "### AWS deploy completed"
            echo ""
            echo "- Image: \`${{ steps.build-image.outputs.image }}\`"
            echo "- Cluster: \`${{ env.ECS_CLUSTER }}\`"
            echo "- Service: \`${{ env.ECS_SERVICE }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
